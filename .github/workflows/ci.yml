name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: oxlint
        run: pnpm lint
      - name: oxfmt
        run: pnpm fmt:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  integration:
    name: Integration (TS3 + TS6)
    runs-on: ubuntu-latest
    services:
      ts3:
        image: teamspeak:latest
        env:
          TS3SERVER_LICENSE: accept
        ports:
          - 9987:9987/udp
        options: >-
          --health-cmd "nc -z -u localhost 9987 || exit 1"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 15
      ts6:
        image: teamspeaksystems/teamspeak6-server:latest
        env:
          TSSERVER_LICENSE_ACCEPTED: accept
        ports:
          - 9988:9987/udp
        options: >-
          --health-cmd "nc -z -u localhost 9987 || exit 1"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run integration tests
        env:
          TS3_ADDR: localhost:9987
          TS6_ADDR: localhost:9988
        run: pnpm tsx examples/test-servers.ts
