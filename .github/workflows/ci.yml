name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: oxlint
        run: pnpm lint
      - name: oxfmt
        run: pnpm fmt:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  integration:
    name: Integration (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: TS3
            addr: localhost:9987
          - name: TS6
            addr: localhost:9988
    services:
      ts3:
        image: teamspeak:latest
        env:
          TS3SERVER_LICENSE: accept
        ports:
          - 9987:9987/udp
      ts6:
        image: teamspeaksystems/teamspeak6-server:latest
        env:
          TSSERVER_LICENSE_ACCEPTED: accept
        ports:
          - 9988:9987/udp
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Wait for servers to be ready
        run: sleep 10
      - name: Run integration tests
        env:
          TEAMSPEAK_ADDR: ${{ matrix.addr }}
          TEAMSPEAK_SERVER_PASSWORD: ${{ secrets.TEAMSPEAK_SERVER_PASSWORD }}
          TEAMSPEAK_DEFAULT_CHANNEL: ${{ secrets.TEAMSPEAK_DEFAULT_CHANNEL }}
          TEAMSPEAK_DEFAULT_CHANNEL_PASSWORD: ${{ secrets.TEAMSPEAK_DEFAULT_CHANNEL_PASSWORD }}
        run: pnpm test src/integration.test.ts
